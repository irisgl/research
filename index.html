<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>סימולציית מנהל דיגיטלי</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap');
  :root {
    --bg:#f5f6fa;--card:#fff;--primary:#2d5be3;--primary-light:#e8edfb;
    --primary-dark:#1a3fa0;--text:#1e2a3a;--text2:#5a6a7e;--border:#dfe3eb;
    --success:#22a06b;--success-bg:#e3fcef;--error:#de350b;--error-bg:#ffebe6;
    --ai-bg:#f0f4ff;--ai-border:#5b8def;--user-bg:#e8edfb;
    --shadow:0 2px 12px rgba(0,0,0,.06);--radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Rubik',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}
  .container{max-width:1120px;margin:0 auto;padding:28px 22px 60px}

  /* Progress */
  .progress-bar{display:flex;gap:6px;margin-bottom:28px}
  .progress-step{flex:1;height:6px;border-radius:3px;background:var(--border);transition:background .4s}
  .progress-step.done{background:var(--success)}.progress-step.active{background:var(--primary)}

  /* Card */
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:32px 30px 28px;margin-bottom:20px;border:1px solid var(--border)}
  .scenario-badge{display:inline-block;background:var(--primary);color:#fff;font-size:13px;font-weight:600;padding:5px 16px;border-radius:20px;margin-bottom:16px}
  h1{font-size:26px;font-weight:700;margin-bottom:10px}
  h2{font-size:21px;font-weight:600;margin-bottom:14px}
  p,li{font-size:15px;color:var(--text2);margin-bottom:10px;line-height:1.8}
  .bg-text{font-size:15px;color:var(--text);background:#f8f9fb;padding:16px 20px;border-radius:10px;border-right:4px solid var(--primary-light);margin-bottom:18px;line-height:1.9}

  /* Table */
  table{width:100%;border-collapse:collapse;margin:18px 0;font-size:14px;border-radius:14px;overflow:hidden;border:1px solid var(--border)}
  th{background:#f7f9ff;color:var(--primary-dark);font-weight:600;padding:12px 14px;text-align:right;border-bottom:2px solid var(--primary);font-size:12px;letter-spacing:.02em}
  td{padding:12px 14px;border-bottom:1px solid var(--border);text-align:right;font-size:14px;transition:background .15s ease}
  .table-wrap{border-radius:14px;overflow:auto;-webkit-overflow-scrolling:touch}
  .table-wrap thead th{position:sticky;top:0;z-index:2;background:#f7f9ff;box-shadow:0 1px 0 rgba(0,0,0,.06)}
  .table-wrap tbody tr:nth-child(odd) td{background:#fcfdff}
  .table-wrap tbody tr:hover td{background:#f2f5ff}
  .table-wrap td+td,.table-wrap th+th{border-left:1px solid #eef1f6}
  .legend{font-size:13px;color:var(--text2);background:#f8f9fb;padding:10px 14px;border-radius:8px;margin:12px 0}
  .task-text{font-size:16px;font-weight:600;color:var(--text);margin:16px 0 8px}
  .options-text{font-size:14px;color:var(--text2);font-style:italic}

  /* Chat */
  .chat-area{margin:20px 0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.04)}
  .chat-header{background:var(--ai-bg);padding:14px 20px;border-bottom:1px solid var(--ai-border);display:flex;align-items:center;gap:12px}
  .chat-header .avatar{width:40px;height:40px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;box-shadow:0 2px 6px rgba(45,91,227,.3)}
  .chat-header .name{font-weight:600;font-size:15px;color:var(--primary-dark)}
  .chat-header .status{font-size:12px;color:var(--ai-border)}
  .chat-messages{padding:20px;min-height:120px;max-height:450px;overflow-y:auto;background:#fafbfd;display:flex;flex-direction:column;gap:14px}
  .msg{max-width:82%;padding:14px 18px;border-radius:16px;font-size:14.5px;line-height:1.8;white-space:pre-wrap;animation:msgIn .3s ease-out}
  @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .msg.ai{background:var(--ai-bg);border:1px solid var(--ai-border);align-self:flex-start;border-top-right-radius:4px}
  .msg.user{background:var(--user-bg);border:1px solid var(--primary-light);align-self:flex-end;border-top-left-radius:4px;color:var(--text)}
  .msg.system{background:#fff8e1;border:1px solid #ffe082;align-self:center;text-align:center;font-size:13px;color:#6d4c00;max-width:90%;border-radius:10px}
  .typing{display:flex;align-items:center;gap:4px;padding:8px 16px;align-self:flex-start}
  .typing span{width:7px;height:7px;background:var(--ai-border);border-radius:50%;animation:blink 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
  .chat-input{display:flex;gap:10px;padding:14px 18px;padding-bottom:calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--border);background:#fff}
  .chat-input input{flex:1;padding:11px 16px;font-size:15px;font-family:'Rubik',sans-serif;border:1.5px solid var(--border);border-radius:10px;outline:none;transition:border .2s}
  .chat-input input:focus{border-color:var(--primary)}
  .chat-input button{padding:11px 24px;font-size:14px;font-weight:600;font-family:'Rubik',sans-serif;background:var(--primary);color:#fff;border:none;border-radius:10px;cursor:pointer;transition:background .2s;white-space:nowrap}
  .chat-input button:hover{background:var(--primary-dark)}
  .chat-input button:disabled{background:#b0bec5;cursor:not-allowed}

  /* Choice input */
  .choice-section{margin:20px 0;padding:20px;background:#f8f9fb;border-radius:var(--radius);border:1px solid var(--border)}
  .choice-section label{display:block;font-weight:600;font-size:15px;margin-bottom:8px}
  .choice-section input[type="text"]{width:100%;padding:12px 16px;font-size:18px;font-family:'Rubik',sans-serif;border:2px solid var(--border);border-radius:8px;direction:ltr;text-align:center;letter-spacing:2px;outline:none;transition:border .2s}
  .choice-section input:focus{border-color:var(--primary)}
  .error-msg{background:var(--error-bg);color:var(--error);padding:10px 16px;border-radius:8px;font-size:14px;margin:10px 0;display:none}
  .error-msg.show{display:block}

  /* Buttons */
  .btn{display:block;width:100%;padding:14px;font-size:16px;font-weight:600;font-family:'Rubik',sans-serif;border:none;border-radius:10px;cursor:pointer;transition:all .2s;margin-top:12px}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{background:var(--primary-dark)}.btn-primary:active{transform:scale(.98)}
  .btn-primary:disabled{background:#b0bec5;cursor:not-allowed}
  .btn-secondary{background:transparent;color:var(--primary);border:2px solid var(--primary)}
  .btn-secondary:hover{background:var(--primary-light)}

  /* Likert */
  .likert-q{font-size:16px;font-weight:600;margin-bottom:12px;color:var(--text)}
  .likert-scale{display:flex;justify-content:space-between;gap:6px;margin:16px 0}
  .likert-scale label{flex:1;text-align:center;cursor:pointer}
  .likert-scale input[type="radio"]{display:none}
  .likert-scale .lk{display:block;padding:12px 0;font-size:18px;font-weight:600;border:2px solid var(--border);border-radius:10px;transition:all .15s;color:var(--text2)}
  .likert-scale input:checked+.lk{background:var(--primary);color:#fff;border-color:var(--primary);transform:scale(1.05)}
  .likert-scale label:hover .lk{border-color:var(--primary);color:var(--primary)}
  .likert-anchors{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-top:-6px}

  /* Completion */
  .completion-box{background:var(--success-bg);border:2px solid var(--success);border-radius:var(--radius);padding:28px;text-align:center;margin:20px 0}
  .confirm-msg{background:var(--success-bg);color:var(--success);padding:12px 18px;border-radius:8px;font-weight:600;font-size:15px;margin:16px 0}
  .micro-explain{font-size:14px;color:var(--text2);font-style:italic;margin:8px 0 16px}
  .saving-status{font-size:13px;color:var(--text2);text-align:center;margin-top:8px}
  .screen{animation:fadeIn .35s ease-out}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .rounds-left{font-size:12px;color:var(--text2);text-align:center;padding:4px}

  /* Responsive layout */
  .layout{display:grid;gap:18px;align-items:start}
  .layout.with-chat{grid-template-columns:1fr;grid-template-areas:
    "scenario"
    "chat";}
  .layout.no-chat{grid-template-columns:1fr;grid-template-areas:
    "scenario";}
  .scenario-card{grid-area:scenario}
  .chat-area{grid-area:chat}

  /* Tables: scroll on small screens */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:10px 0;border-radius:8px}
  .table-wrap table{min-width:520px;margin:0}
  th,td{padding:10px 10px;font-size:13px;white-space:nowrap}

  /* Compact cards */
  .card{padding:26px 24px 22px}
  .bg-text{padding:14px 16px;margin-bottom:14px}
  .legend{margin:10px 0}
  .scenario-badge{margin-bottom:10px;padding:4px 12px;font-size:12px;opacity:.95}
  h2{margin-bottom:10px}

  /* Pills for table values */
  .pill{display:inline-flex;align-items:center;justify-content:center;padding:2px 10px;border-radius:999px;font-weight:700;font-size:12px;line-height:1;border:1px solid var(--border);background:#fff;color:var(--text)}
  .pill.u5{background:var(--error-bg);border-color:#ffbdad;color:var(--error)}
  .pill.u4{background:#fff4e5;border-color:#ffd8a8;color:#9c6f00}
  .pill.u3{background:#fff4e5;border-color:#ffd8a8;color:#9c6f00}
  .pill.u2{background:#e3fcef;border-color:#abf5d1;color:#006644}
  .pill.u1{background:#f1f3f5;border-color:#e9ecef;color:#495057}

  /* Desktop: chat on the side */
  @media (min-width: 1024px){
    .layout.with-chat{
      grid-template-columns:420px minmax(0,1fr);
      grid-template-areas:"chat scenario";
      align-items:start;
    }
    .chat-area{position:sticky;top:18px}
    .chat-messages{max-height:min(560px, calc(100vh - 260px))}
  }

  /* Tablet & Mobile */
  @media (max-width: 700px){
    .container{padding:12px 8px 40px}
    .card{padding:18px 14px}
    h1{font-size:20px}
    h2{font-size:17px}
    .bg-text{padding:12px 12px;font-size:14px}
    .table-wrap table{min-width:640px}
    th,td{padding:8px 6px;font-size:12px}
    .chat-area{border-radius:10px}
    .chat-messages{padding:12px;max-height:320px;min-height:100px}
    .msg{max-width:90%;font-size:13.5px;padding:11px 14px}
    .chat-input{padding:10px 12px}
    .chat-input input{font-size:16px;padding:10px 12px}
    .chat-input button{padding:10px 16px;font-size:14px}
    .likert-scale{gap:4px}
    .likert-scale .lk{font-size:15px;min-width:36px;min-height:36px}
    .scenario-badge{font-size:11px;padding:3px 10px}
    .task-text{font-size:14px}
    .options-text{font-size:13px}
    .legend{font-size:12px;padding:8px 10px}
    .pill{font-size:11px;padding:2px 8px}
    .progress-bar{margin-bottom:16px}
  }

  @media (max-width: 380px){
    .container{padding:8px 6px 36px}
    .card{padding:14px 10px}
    .chat-header{padding:10px 12px}
    .chat-header .avatar{width:32px;height:32px;font-size:16px}
    .chat-header .name{font-size:14px}
    .btn{font-size:14px;padding:12px 18px}
    th,td{padding:6px 4px;font-size:11px}
    .msg{max-width:94%;font-size:13px;padding:10px 12px}
  }

  /* ── Premium touches ── */
  body{
    background:
      radial-gradient(900px 520px at 85% -10%, rgba(45,91,227,.10), transparent 60%),
      radial-gradient(820px 520px at -10% 20%, rgba(34,160,107,.08), transparent 55%),
      var(--bg);
  }
  .card{position:relative;overflow:hidden}
  .card::before{
    content:"";position:absolute;left:0;right:0;top:0;
    height:3px;background:linear-gradient(90deg,var(--primary),#6f8cff);opacity:.9;
  }
  button,.btn{box-shadow:0 6px 16px rgba(45,91,227,.18)}
  button:hover,.btn:hover{transform:translateY(-1px)}
  button:active,.btn:active{transform:translateY(0);box-shadow:0 3px 10px rgba(45,91,227,.14)}
  :focus-visible{outline:3px solid rgba(45,91,227,.35);outline-offset:2px;border-radius:10px}
  .chat-input input:focus{box-shadow:0 0 0 4px rgba(45,91,227,.12)}
  .table-wrap thead th{position:sticky;top:0;z-index:2}
  td{transition:background .15s ease}
  tr:hover td{background:#f2f5ff}
  .msg{box-shadow:0 2px 10px rgba(0,0,0,.04)}
  .msg.ai{box-shadow:0 2px 12px rgba(45,91,227,.08)}
  .msg.user{box-shadow:0 2px 12px rgba(45,91,227,.06)}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
// ═══════════════════════════════════════════════════
// *** CONFIGURATION ***
// ═══════════════════════════════════════════════════
const CONFIG = {
APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbwe7lF2jBBTLf1nI72bs6tl-sCTq7MoF4NTva_qsvmY_WrIsiyAGos2cqrdd4DD0rHieA/exec',
  MODEL: 'gpt-4o-mini',      // gpt-4o-mini (~$0.01/participant) or gpt-4o
  MAX_CHAT_ROUNDS: 5          // max follow-up questions per scenario
};

// ═══════════════════════════════════════════════════
// SCENARIOS
// ═══════════════════════════════════════════════════
const SCENARIOS = [
  // ── 2 ──
  { title:"בחירת \"עובד החודש\"", dKey:"D2",
    background:"סוף חודש. צריך לבחור \"עובד החודש\" על בסיס נתוני ביצוע. הבחירה משפיעה על מוטיבציה ותפיסת הוגנות בצוות.",
    tableHTML:`<table><tr><th>קוד</th><th>נציג/ה</th><th>שב"ר</th><th>זמן תגובה</th><th># פניות</th><th>מורכבות</th><th>זמינות</th></tr>
<tr><td>R</td><td>רועי</td><td>4.8/5</td><td>3 דק'</td><td>180</td><td>45</td><td>20</td></tr>
<tr><td>S</td><td>שקד</td><td>4.2/5</td><td>5 דק'</td><td>220</td><td>30</td><td>22</td></tr>
<tr><td>Y</td><td>יעל</td><td>4.9/5</td><td>2 דק'</td><td>150</td><td>60</td><td>18</td></tr>
<tr><td>D</td><td>דני</td><td>4.0/5</td><td>6 דק'</td><td>240</td><td>20</td><td>22</td></tr>
<tr><td>M</td><td>מיה</td><td>4.5/5</td><td>4 דק'</td><td>200</td><td>50</td><td>21</td></tr></table>`,
    legend:"שב\"ר: ממוצע חודשי · זמן תגובה: דקות · מורכבות: פניות מאתגרות · זמינות: ימי עבודה בחודש",
    task:"בחר/י עובד/ת אחד/ת.", validOptions:"R (רועי) / S (שקד) / Y (יעל) / D (דני) / M (מיה)",
    inputLabel:"הקלד/י אות או שם: R / S / Y / D / M", placeholder:"למשל: R או רותם",
    microExplanation:"בבחירת עובד מצטיין, האיזון הוא בין כמות לאיכות ובין נוכחות לעוצמת תרומה.",
    llmRec:"Y (יעל)",
    llmContext:`5 נציגים: R רועי 4.8/5 3דק' 180 45מורכבות 20ימים. S שקד 4.2/5 5דק' 220 30 22. Y יעל 4.9/5 2דק' 150 60 18. D דני 4.0/5 6דק' 240 20 22. M מיה 4.5/5 4דק' 200 50 21.`,
    llmInstruction:`אתה נוטה לכיוון Y (יעל) אבל אסור לך לומר ישירות מה לבחור.
שיקולים פנימיים: שב"ר גבוה+תגובה מהירה; מורכבות=איכות עבודה; זמינות נמוכה מפוצה באיכות.
הכוון את המשתתף: שאל מה חשוב לו — כמות או איכות? תגובה מהירה או נוכחות?`,
    validate(v){const c=v.trim().toUpperCase();if('RSYDM'.includes(c)&&c.length===1)return c;const names={'רועי':'R','שקד':'S','יעל':'Y','דני':'D','מיה':'M'};return names[v.trim()]||null},
    score(d){return{Y:10,R:8,M:6,S:4,D:4}[d]||0}
  },
  // ── 3 ──
  { title:"הקצאת תקציב לשיפור שירות", dKey:"D3",
    background:"יש תקציב של 10,000 ₪ לשיפור שירות ברבעון הקרוב. מצפים לשיפור מורגש, והצוות תחת עומס ותהליכים לא יעילים.",
    tableHTML:`<table><tr><th>קוד</th><th>פעולה</th><th>עלות</th><th>השפעה</th></tr>
<tr><td>A</td><td>שדרוג CRM</td><td>7,000 ₪</td><td>8/10</td></tr>
<tr><td>B</td><td>הדרכת נציגים</td><td>4,000 ₪</td><td>1/10</td></tr>
<tr><td>C</td><td>בונוסים</td><td>5,000 ₪</td><td>4/10</td></tr>
<tr><td>D</td><td>כלי ניתוח (BI)</td><td>3,000 ₪</td><td>5/10</td></tr></table>`,
    legend:"השפעה: על עבודה יומיומית (10 גבוה) · 1-2 פעולות, עד 10,000 ₪",
    task:"בחר/י צירוף אחד חוקי.", validOptions:"צירופים: A / AD / BD / BC",
    inputLabel:"הקלד/י צירוף: A / AD / BD / BC", placeholder:"למשל: BC",
    microExplanation:"בהקצאת תקציב, השיקול הוא איזון בין עוצמת השפעה לניצול מיטבי של המשאבים.",
    llmRec:"AD",
    llmContext:`תקציב 10,000₪. A: CRM 7000₪ 8/10. B: הדרכה 4000₪ 1/10. C: בונוסים 5000₪ 4/10. D: BI 3000₪ 5/10. צירופים: A/AD/BD/BC.`,
    llmInstruction:`אתה נוטה לכיוון AD (שדרוג CRM + כלי ניתוח) אבל אסור לך לומר ישירות מה לבחור.
שיקולים פנימיים: CRM=השפעה תהליכית גבוהה; BI=ניטור בזול; יחד=תשתית שלמה ב-10K.
הכוון את המשתתף: שאל על סדרי עדיפויות — השפעה מיידית או בניית תשתית? תקציב מלא או חלוקה?`,
    validate(v){const c=v.trim().toUpperCase();return['A','AD','BD','BC'].includes(c)?c:null},
    score(d){return{AD:10,A:8,BD:7,BC:6}[d]||0}
  },
  // ── 4: MANIPULATION ──
  { title:"זיהוי סיבה לתקלה טכנית", dKey:"D4",
    background:"לקוח מדווח על איטיות במערכת בשלושת הימים האחרונים. האיטיות מחמירה ככל שעובר הזמן, גם כשהמשתמש לא פותח טאבים נוספים ולא מבצע פעולות חריגות. שימוש הזיכרון של הטאב עולה בהדרגה (מ-400MB ל-2.6GB תוך 10-15 דק').",
    tableHTML:`<table><tr><th>אות</th><th>בדיקה</th><th>תוצאה</th></tr>
<tr><td>A</td><td>שרת</td><td>תקין</td></tr>
<tr><td>B</td><td>אינטרנט</td><td>100 Mbps</td></tr>
<tr><td>C</td><td>דפדפן</td><td>Chrome גרסה עדכנית</td></tr>
<tr><td>D</td><td>טאבים פתוחים</td><td>8</td></tr>

async function callLLM(messages){
  if(!CONFIG.APPS_SCRIPT_URL) return getFallbackReply();
  for(let attempt=0;attempt<3;attempt++){
    try{
      const chatMsgs=messages.filter(m=>m.role!=='system');
      // Keep only last 4 messages to avoid URL length issues with JSONP
      const trimmedMsgs=chatMsgs.length>4?chatMsgs.slice(-4):chatMsgs;
      const compact={idx:ST.cur,cond:ST.cond,msgs:trimmedMsgs,model:CONFIG.MODEL,pid:PARTICIPANT_ID};
      const payload=encodeURIComponent(JSON.stringify(compact));
      const cbName='cb_'+Date.now()+'_'+attempt;
      const result=await new Promise((resolve)=>{
        console.log('LLM attempt '+(attempt+1)+'/3');
        const timeout=setTimeout(()=>{console.warn('LLM TIMEOUT attempt '+(attempt+1));resolve(null);cleanup()},55000);
        window[cbName]=function(data){
          clearTimeout(timeout);
          if(data.error){console.warn('LLM ERROR:',data.error)}
          else{console.log('LLM OK:',String(data.reply).substring(0,60))}
          resolve(data.reply||null);
          cleanup();
        };
        function cleanup(){delete window[cbName];if(script.parentNode)script.parentNode.removeChild(script)}
        const script=document.createElement('script');
        script.src=CONFIG.APPS_SCRIPT_URL+'?callback='+cbName+'&payload='+payload;
        script.onerror=function(){console.warn('LLM NETWORK ERR attempt '+(attempt+1));clearTimeout(timeout);resolve(null);cleanup()};
        document.body.appendChild(script);
      });
      if(result)return result;
      // First attempt failed — wait 2s and retry
      if(attempt<2)await new Promise(r=>setTimeout(r,2000));
    }catch(e){console.error('LLM error:',e)}
  }
  return getFallbackReply();
}

function getFallbackReply(){return'מצטער/ת, לא הצלחתי להתחבר. נסה/י לשאול שוב או הזן/י את בחירתך.'}

async function saveToSheets(row){

  try{
    const lite={...row};
    delete lite.chat_logs;
    const payload=encodeURIComponent(JSON.stringify({save:1,data:lite}));
    const cbName='sv_'+Date.now();
    return new Promise((resolve)=>{
      const timeout=setTimeout(()=>{resolve({ok:false,reason:'timeout'});cleanup()},12000);
      window[cbName]=function(d){clearTimeout(timeout);resolve({ok:true});cleanup()};
      function cleanup(){delete window[cbName];if(s.parentNode)s.parentNode.removeChild(s)}
      const s=document.createElement('script');
      s.src=CONFIG.APPS_SCRIPT_URL+'?callback='+cbName+'&save=1&payload='+payload;
      s.onerror=function(){clearTimeout(timeout);resolve({ok:false,reason:'network'});cleanup()};
      document.body.appendChild(s);
    });
  }catch(e){return{ok:false,reason:e.message}}
}

    D1:ST.D.D1||'',D2:ST.D.D2||'',D3:ST.D.D3||'',D4:ST.D.D4||'',D5:ST.D.D5||'',
    R1:ST.R.R1||'',R2:ST.R.R2||'',R3:ST.R.R3||'',R4:ST.R.R4||'',R5:ST.R.R5||'',
    C1:ST.C.C1||'',C2:ST.C.C2||'',C3:ST.C.C3||'',C4:ST.C.C4||'',C5:ST.C.C5||''};
  // Per-scenario timing
  for(let i=1;i<=5;i++){
    const ts=ST.ts[`S${i}`];
    row[`S${i}_duration_sec`]=ts&&ts.end?Math.round((ts.end-ts.start)/1000):'';
  }
  // Chat metrics
  const chatEnabled=(ST.cond==='B'||ST.cond==='C')?1:0;
  row.chat_enabled=chatEnabled;
  for(let i=1;i<=5;i++){
    const sKey=`S${i}`;
    row[`chat_msg_count_S${i}`]=ST.chatMsgCount[sKey]||0;
    const firstMsg=ST.chatFirstMsgTime[sKey];
    const scenEnd=(ST.ts[sKey]&&ST.ts[sKey].end)||ST.tEnd;
    row[`chat_time_S${i}`]=firstMsg&&scenEnd?Math.round((scenEnd-firstMsg)/1000):0;
  }
  Object.assign(row,sc);
  row.TotalScore=total;
  row.TotalScoreNorm=Math.round(total/50*1000)/10;
  row.TotalTimeSec=rawTime;
  row.MC_transparency=ST.MC.MC_transparency||'';
  row.MC_explainability=ST.MC.MC_explainability||'';
  row.MC_trust=ST.MC.MC_trust||'';
  row.attention_check=ST.MC.attention_check||'';
  // Device info (non-PII)
  const ua=navigator.userAgent;
  row.device_type=/Mobi|Android/i.test(ua)?'mobile':'desktop';
  row.browser=(/Chrome/.test(ua)&&!/Edg/.test(ua))?'Chrome':/Safari/.test(ua)&&!/Chrome/.test(ua)?'Safari':/Firefox/.test(ua)?'Firefox':/Edg/.test(ua)?'Edge':'other';
  row.chat_logs=JSON.stringify(ST.allChatLogs);
  // Survey data
  Object.keys(ST.survey).forEach(k=>{row['survey_'+k]=ST.survey[k]});
  return row;
}

function submitScreening(){

  if(!ageVal||!employ||!eng||!org||!sector){
    scErr.textContent='נא לענות על כל השאלות.';scErr.classList.add('show');return;
  }
  const ageNum=parseInt(ageVal);
  if(isNaN(ageNum)||ageNum<10||ageNum>120){
    scErr.textContent='נא להזין גיל תקין.';scErr.classList.add('show');return;

function renderSurveyPage({title,subtitle,items,scaleMin,scaleMax,anchorLow,anchorHigh,prefix,nextPhase,pageNum,totalPages}){
  const scaleRange=[];for(let i=scaleMin;i<=scaleMax;i++)scaleRange.push(i);
  const isMobile=window.innerWidth<=600;
  const mobileRange=(scaleMax-scaleMin>7)?scaleRange.filter(n=>n%2===0):scaleRange;
  const displayRange=isMobile?mobileRange:scaleRange;
  const surveyProgress=pageNum&&totalPages?`<div style="font-size:13px;color:var(--text2);margin-bottom:12px">עמוד ${pageNum} מתוך ${totalPages}</div>`:'';
  app.innerHTML=`<div class="screen"><div class="card" style="max-width:700px;margin:0 auto">
    <div style="direction:rtl;text-align:right"><h2>${title}</h2>
    ${subtitle?`<p style="margin-bottom:20px;font-size:14px;color:var(--text2)">${subtitle}</p>`:''}
    ${surveyProgress}</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px;display:flex;justify-content:space-between;direction:rtl"><span>${anchorHigh}</span><span>${anchorLow}</span></div>
    ${items.map((q,idx)=>`
      <div style="margin-bottom:18px;padding:14px 16px;background:#f8f9fb;border-radius:10px;border:1px solid var(--border)">
        <div style="font-size:14px;margin-bottom:10px;line-height:1.6;direction:ltr;text-align:left">${q}</div>
        <div class="likert-scale" style="direction:ltr">${displayRange.map(n=>`<label><input type="radio" name="sq_${idx}" value="${n}"><span class="lk">${n}</span></label>`).join('')}</div>
      </div>`).join('')}
    <div class="error-msg" id="survErr" style="direction:rtl;text-align:right"></div>
    <button class="btn btn-primary" onclick="submitSurveyPage('${prefix}',${items.length},'${nextPhase}')">המשך →</button>
  </div></div>`;
}

function submitSurveyPage(prefix,count,nextPhase){
  for(let i=0;i<count;i++){
    const checked=document.querySelector(`input[name="sq_${i}"]:checked`);
    if(!checked){$('survErr').textContent='נא לענות על כל השאלות.';$('survErr').classList.add('show');return}
    ST.survey[`${prefix}${i+1}`]=+checked.value;
  }
  if(nextPhase==='scenario'){ST.cur=0;ST.ts.S1={start:Date.now()};ST.chatHistory=[];ST.chatRounds=0;ST.choiceMade=false}
  if(nextPhase==='done'&&!ST.tEnd){ST.tEnd=Date.now()}
  ST.phase=nextPhase;go();
}

function submitAttnCheck(){
  const attn=document.querySelector('input[name="attn_pre"]:checked');
  if(!attn){document.getElementById('attnErr').textContent='נא לענות על השאלה.';document.getElementById('attnErr').classList.add('show');return;}
  ST.survey.attention_check_pre = +attn.value===4?'pass':'fail';
  if(+attn.value!==4){
    // Failed attention check — redirect to sekernet with status=3 if from panel, else show message
    if(SURVEY_ID&&SEKERNET_UID){
      const url=`https://panel.sekernet.co.il/?surveyid=${encodeURIComponent(SURVEY_ID)}&uid=${encodeURIComponent(SEKERNET_UID)}&status=3`;
      app.innerHTML=`<div class="screen"><div class="card" style="text-align:center;padding:40px">
        <div style="font-size:48px;margin-bottom:16px">🙏</div>
        <h2>תודה על ההתעניינות</h2>

        <p style="font-size:13px;color:var(--text2);margin-top:8px">מועברת/מועבר חזרה...</p>
      </div></div>`;
      setTimeout(()=>{window.location.href=url;},1500);
    } else {
      app.innerHTML=`<div class="screen"><div class="card" style="text-align:center;padding:40px">
        <div style="font-size:48px;margin-bottom:16px">⚠️</div>
        <h2>לא ניתן להמשיך</h2>
        <p style="margin-top:12px;color:var(--text2)">נא לסמן את המספר הנכון.</p>
      </div></div>`;
    }
    return;
  }
  ST.cur=0;ST.ts.S1={start:Date.now()};ST.chatHistory=[];ST.chatRounds=0;ST.choiceMade=false;
  ST.phase='scenario';go();
}

function s1SelectMetric(id){
  if(ST.s1.firstChoice) return;
  ST.s1.firstChoice = id;
  // Hide unselected cards, show only selected compactly
  const grid = document.getElementById('metricsGrid');
  const selMetric = S1_METRICS.find(x=>x.id===id);
  grid.innerHTML = `<div style="grid-column:1/-1;background:var(--primary-light);border:2px solid var(--primary);border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:12px">
    <span style="font-size:22px">${selMetric.icon}</span>
    <div>
      <div style="font-size:12px;color:var(--text2);font-weight:600">${selMetric.name}</div>
      <div style="font-size:16px;font-weight:700;color:var(--text)">${selMetric.value} <span style="font-size:12px;font-weight:500" class="${selMetric.changeClass}">${selMetric.change}</span></div>
    </div>
    <span style="margin-right:auto;font-size:12px;color:var(--primary);font-weight:500">✓ בחירה ראשונית</span>
  </div>`;
  // Show explain box
  document.getElementById('s1ExplainBox').style.display='block';
  setTimeout(()=>document.getElementById('s1ExplainBox').scrollIntoView({behavior:'smooth',block:'start'}),100);
  // Show AI bubble for B/C (with typing delay)
  if(ST.cond==='B'||ST.cond==='C'){
    const bubble = document.getElementById('s1AiBubble');
    const aiText = document.getElementById('s1AiText');
    bubble.style.display='block';
    aiText.innerHTML='<span style="opacity:.5">מקליד/ה...</span>';
    setTimeout(()=>{
      const el=document.getElementById('s1AiText');if(el)el.textContent = ST.cond==='C' ? S1_AI_C : S1_AI_B;
    }, 1200);
    const h1=document.getElementById('s1ChangeHint');if(h1)h1.textContent='בחירה ראשונית — אפשר לשנות אחרי השיחה עם דנה.';
    const nb1=document.getElementById('s1NextBtn');if(nb1)nb1.textContent='המשך לשיחה עם דנה ←';
  } else {
    const h2=document.getElementById('s1ChangeHint');if(h2)h2.textContent='בחירה ראשונית — תוכל/י לשנות לפני האישור הסופי.';
    const nb2=document.getElementById('s1NextBtn');if(nb2)nb2.textContent='המשך לאישור סופי ←';
  }
}

async function s1GoToChat(){
  ST.s1.explanation = document.getElementById('s1ExplainText')?.value||'';
  if(ST.cond==='A'){
    s1GoConfirm();
    return;
  }
  // B/C: go to chat
  const m = S1_METRICS.find(x=>x.id===ST.s1.firstChoice);
  // AI opens the chat with reference to the user's choice
  // Hardcoded first response - no LLM hallucinations
  const S1_FIRST_C = {
    response_time: 'יש כאן שני כיוונים סבירים: זמן תגובה ושביעות רצון לקוחות. אני נוטה לזמן התגובה — הוא החמיר הכי חד ויכול להסביר גם את הירידה בשביעות הרצון.',
    satisfaction:  'יש כאן שני כיוונים סבירים: שביעות רצון וזמן תגובה. אני נוטה לשביעות הרצון — היא משקפת את תחושת הלקוח הכוללת, שזה מה שחשוב לטווח הארוך.',
    open_tickets:  'יש כאן שני כיוונים סבירים: זמן תגובה ושביעות רצון לקוחות. פניות פתוחות דווקא ירדו — אולי כדאי להתמקד במדד שהחמיר.',
    open_issues:   'יש כאן שני כיוונים סבירים: זמן תגובה ושביעות רצון לקוחות. תקלות לא פתורות יציבות — אולי כדאי להתמקד במדד שהחמיר.'
  };
  const S1_FIRST_B = {
    response_time: 'יש כאן שני כיוונים סבירים. אני נוטה לאחד מהם על בסיס הנתונים.',
    satisfaction:  'יש כאן שני כיוונים סבירים. אני נוטה לאחד מהם על בסיס הנתונים.',
    open_tickets:  'יש כאן שני כיוונים סבירים. אני נוטה לאחד מהם על בסיס הנתונים.',
    open_issues:   'יש כאן שני כיוונים סבירים. אני נוטה לאחד מהם על בסיס הנתונים.'
  };
  renderS1Chat();
  const firstReply = ST.cond === 'C' ? (S1_FIRST_C[ST.s1.firstChoice]||S1_FIRST_C.response_time) : (S1_FIRST_B[ST.s1.firstChoice]||S1_FIRST_B.response_time);
  ST.chatHistory.push({role:'assistant', content: firstReply});
  s1AddMsg('ai', firstReply);
}

function renderS1Chat(){
  const m = S1_METRICS.find(x=>x.id===ST.s1.firstChoice);
  app.innerHTML=`<div class="screen">${pBar()}<div class="card">

async function s1SendFirst(instructions){
  // instructions is a system-level prompt, not shown to user
  // push as user message internally so LLM gets context
  ST.chatHistory.push({role:'user', content:instructions});
  {const cb=document.getElementById('s1ConfirmBtn');if(cb)cb.disabled=true;} s1ShowTyping();
  const reply = await s1CallLLM();
  s1HideTyping();
  // Remove the instructions from history, keep only AI reply
  ST.chatHistory.pop();
  if(reply){ST.chatHistory.push({role:'assistant',content:reply});s1AddMsg('ai',reply);}
}

function s1QuickReply(btn, text){
  const qr = document.getElementById('quickReplies');
  if(qr) qr.style.display='none';
  const inp = document.getElementById('chatText');
  if(inp) inp.value = text;
  s1SendMsg();
  const confirmBtn=document.getElementById('s1ConfirmBtn');
  const hintMsg=document.getElementById('s1HintMsg');
  if(confirmBtn)confirmBtn.style.display='block';
  if(hintMsg)hintMsg.style.display='none';
}

async function s1SendMsg(){
  if(ST.chatRounds>=CONFIG.MAX_CHAT_ROUNDS)return;
  const inp=document.getElementById('chatText');
  const text=inp?.value?.trim();
  if(!text)return;
  inp.value='';
  ST.chatHistory.push({role:'user',content:text});
  ST.chatRounds++;
  s1AddMsg('user',text);
  s1UpdateRounds();
  // Track chat metrics
  const _sKey1=`S1`;
  if(!ST.chatMsgCount[_sKey1])ST.chatMsgCount[_sKey1]=0;
  ST.chatMsgCount[_sKey1]++;
  if(!ST.chatFirstMsgTime[_sKey1])ST.chatFirstMsgTime[_sKey1]=Date.now();
  // Hide quick replies after first use
  const qr = document.getElementById('quickReplies');
  if(qr) qr.style.display='none';
  const s1cb=document.getElementById('s1ConfirmBtn');const s1hm=document.getElementById('s1HintMsg');
  if(s1cb)s1cb.style.display='block';if(s1hm)s1hm.style.display='none';
  {const cb=document.getElementById('s1ConfirmBtn');if(cb)cb.disabled=true;} s1ShowTyping();
  const reply=await s1CallLLM();
  s1HideTyping();
  if(reply){ST.chatHistory.push({role:'assistant',content:reply});s1AddMsg('ai',reply);}
}

function s1AddMsg(role,text){
  const msgs=document.getElementById('chatMsgs');
  if(!msgs)return;
  const d=document.createElement('div');
  d.className=`msg ${role}`;d.textContent=text;
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}

function s1ShowTyping(){
  const msgs=document.getElementById('chatMsgs');if(!msgs)return;
  const t=document.createElement('div');t.className='typing';t.id='s1typing';
  t.innerHTML='<span></span><span></span><span></span>';
  msgs.appendChild(t);msgs.scrollTop=msgs.scrollHeight;
}
function s1HideTyping(){document.getElementById('s1typing')?.remove();const cb=document.getElementById('s1ConfirmBtn');if(cb)cb.disabled=false;}

function s1UpdateRounds(){
  const el=document.getElementById('roundsLeft');
  if(el)el.textContent=`${CONFIG.MAX_CHAT_ROUNDS-ST.chatRounds} שאלות נותרו`;
  const btn=document.getElementById('sendBtn');if(btn)btn.disabled=ST.chatRounds>=CONFIG.MAX_CHAT_ROUNDS;
  const inp=document.getElementById('chatText');if(inp)inp.disabled=ST.chatRounds>=CONFIG.MAX_CHAT_ROUNDS;
}

function s1GoChangeChoice(){

  const questions = getS1LikertQ();

        <div class="likert-scale">${[1,2,3,4,5,6,7].map(n=>`<label><input type="radio" name="s1lk_${q.id}" value="${n}"><span class="lk">${n}</span></label>`).join('')}</div>
      </div>`).join('')}
    <div class="error-msg" id="s1LikertErr"></div>
    <button class="btn btn-primary" onclick="s1SubmitLikert()">המשך לתרחיש הבא ←</button>
  </div></div>`;
}

function s1SubmitLikert(){
  const questions = getS1LikertQ();
  const vals={};
  for(const q of questions){
    const v=document.querySelector(`input[name="s1lk_${q.id}"]:checked`);
    if(!v){document.getElementById('s1LikertErr').textContent='נא לענות על כל השאלות.';document.getElementById('s1LikertErr').classList.add('show');return;}
    vals[q.id]=+v.value;
  }
  // Save to ST
  ST.R[`R1`]=vals.confidence||vals.ease||0;
  ST.C[`C1`]=vals.helpful||vals.clarity||0;
  ST.s1.likert=vals;
  ST.D[`D1`]=ST.s1.finalChoice||ST.s1.firstChoice;
  ST.ts[`S1`]={...ST.ts[`S1`], end:Date.now()};
  // Save chat log
  if(ST.chatHistory.length>0){
    ST.allChatLogs[`S1`]=ST.chatHistory.map(m=>({r:m.role==='assistant'?'ai':'user',t:m.content.substring(0,300)}));
    saveChatLog(0, ST.allChatLogs[`S1`]);
  }
  setTimeout(()=>{ST.cur=1;ST.ts[`S2`]={start:Date.now()};ST.phase='scenario';go();},200);
}

async function s1CallLLM(){
  if(!CONFIG.APPS_SCRIPT_URL)return 'לא הצלחתי להתחבר.';
  const msgs=ST.chatHistory.filter(m=>m.role!=='system').slice(-6);
  const compact={idx:99,cond:ST.cond,msgs,model:CONFIG.MODEL,pid:PARTICIPANT_ID};
  for(let attempt=0;attempt<2;attempt++){
    try{
      const payload=encodeURIComponent(JSON.stringify(compact));
      const cbName='s1cb_'+Date.now()+'_'+attempt;
      const result=await new Promise(resolve=>{
        const timeout=setTimeout(()=>{resolve(null);cleanup()},30000);
        window[cbName]=d=>{clearTimeout(timeout);resolve(d.reply||null);cleanup()};
        function cleanup(){delete window[cbName];if(s.parentNode)s.parentNode.removeChild(s)}
        const s=document.createElement('script');
        s.src=CONFIG.APPS_SCRIPT_URL+'?callback='+cbName+'&payload='+payload;
        s.onerror=()=>{clearTimeout(timeout);resolve(null);cleanup()};
        document.body.appendChild(s);
      });
      if(result)return result;
      if(attempt<1)await new Promise(r=>setTimeout(r,2000));
    }catch(e){}
  }
  return 'מצטער/ת, לא הצלחתי להתחבר. נסה/י שוב.';
}

function s2SelectMember(id){
  if(ST.s2.firstChoice) return;
  ST.s2.firstChoice = id;
  const selMember = S2_MEMBERS.find(x=>x.id===id);
  const grid = document.getElementById('s2MembersGrid');
  grid.innerHTML = `<div style="grid-column:1/-1;background:var(--primary-light);border:2px solid var(--primary);border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:12px">
    <span style="font-size:22px">${selMember.icon}</span>
    <div>
      <div style="font-size:13px;font-weight:700;color:var(--text)">${selMember.name}</div>
      <div style="font-size:12px;color:var(--text2)">${selMember.q1} · ${selMember.q2} · ${selMember.q3}</div>
    </div>
    <span style="margin-right:auto;font-size:12px;color:var(--primary);font-weight:500">✓ בחירה ראשונית</span>
  </div>`;
  document.getElementById('s2AfterChoice').style.display='block';
  if(ST.cond==='B'||ST.cond==='C'){
    const bubble = document.getElementById('s2AiBubble');
    const aiText = document.getElementById('s2AiText');
    bubble.style.display='block';
    aiText.innerHTML='<span style="opacity:.5">מקליד/ה...</span>';
    setTimeout(()=>{ aiText.textContent = ST.cond==='C' ? S2_AI_C : S2_AI_B; }, 1200);
  }
  setTimeout(()=>document.getElementById('s2AfterChoice').scrollIntoView({behavior:'smooth',block:'start'}),100);
}

async function s2GoToChat(){
  if(ST.cond==='A'){
    s2GoConfirm();
    return;
  }
  const m = S2_MEMBERS.find(x=>x.id===ST.s2.firstChoice);
  renderS2Chat();
  // Add context as first user message so LLM knows what was chosen
  const contextMsg = `בחרתי להתחיל מ${m.name} (${m.q1}, ${m.q2}, ${m.q3}).`;
  ST.chatHistory.push({role:'user', content: contextMsg});
  const firstReply = ST.cond==='C' ? (S2_FIRST_C[ST.s2.firstChoice]||S2_FIRST_C.mia) : (S2_FIRST_B[ST.s2.firstChoice]||S2_FIRST_B.mia);
  ST.chatHistory.push({role:'assistant', content: firstReply});
  s2AddMsg('ai', firstReply);
}

function renderS2Chat(){
  const m = S2_MEMBERS.find(x=>x.id===ST.s2.firstChoice);
  app.innerHTML=`<div class="screen">${pBar()}<div class="card">
    <span class="scenario-badge">תרחיש 2 — שיחה עם דנה</span>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px">
      ${S2_MEMBERS.map(x=>`<div style="padding:8px 10px;border-radius:10px;border:2px solid ${x.id===ST.s2.firstChoice?'var(--primary)':'var(--border)'};background:${x.id===ST.s2.firstChoice?'var(--primary-light)':'#f8f9fb'};text-align:center;font-size:12px">
        <span style="font-size:18px;display:block">${x.icon}</span>
        <div style="font-weight:700;color:${x.id===ST.s2.firstChoice?'var(--primary)':'var(--text)'}">${x.name}</div>
        <div style="color:var(--text2);font-size:11px">${x.q2}</div>
      </div>`).join('')}
    </div>

function s2QuickReply(btn, text){
  document.getElementById('s2quickReplies').style.display='none';
  const qr = S2_QR.find(q=>q.text===text);
  if(qr){
    s2AddMsg('user',text);
    ST.chatHistory.push({role:'user',content:text});
    ST.chatRounds++;
    s2UpdateRounds();
    const _sqKey2=`S2`;
    if(!ST.chatMsgCount[_sqKey2])ST.chatMsgCount[_sqKey2]=0;
    ST.chatMsgCount[_sqKey2]++;
    if(!ST.chatFirstMsgTime[_sqKey2])ST.chatFirstMsgTime[_sqKey2]=Date.now();
    const reply = ST.cond==='C' ? qr.reply_c : qr.reply_b;
    ST.chatHistory.push({role:'assistant',content:reply});
    s2AddMsg('ai',reply);
  }
  const confirmBtn=document.getElementById('s2ConfirmBtn');
  const hintMsg=document.getElementById('s2HintMsg');
  if(confirmBtn)confirmBtn.style.display='block';
  if(hintMsg)hintMsg.style.display='none';
}

async function s2SendMsg(){
  if(ST.chatRounds>=CONFIG.MAX_CHAT_ROUNDS)return;
  const inp=document.getElementById('chatText');
  const text=inp?.value?.trim();
  if(!text)return;
  inp.value='';
  ST.chatHistory.push({role:'user',content:text});
  ST.chatRounds++;
  s2AddMsg('user',text);
  s2UpdateRounds();
  // Track chat metrics
  const _sKey2=`S2`;
  if(!ST.chatMsgCount[_sKey2])ST.chatMsgCount[_sKey2]=0;
  ST.chatMsgCount[_sKey2]++;
  if(!ST.chatFirstMsgTime[_sKey2])ST.chatFirstMsgTime[_sKey2]=Date.now();
  document.getElementById('s2quickReplies')?.style && (document.getElementById('s2quickReplies').style.display='none');
  const s2cb=document.getElementById('s2ConfirmBtn');const s2hm=document.getElementById('s2HintMsg');
  if(s2cb)s2cb.style.display='block';if(s2hm)s2hm.style.display='none';
  {const cb=document.getElementById('s2ConfirmBtn');if(cb)cb.disabled=true;} s2ShowTyping();
  const reply=await s2CallLLM();
  s2HideTyping();
  if(reply){ST.chatHistory.push({role:'assistant',content:reply});s2AddMsg('ai',reply);}
}

function s2AddMsg(role,text){
  const msgs=document.getElementById('chatMsgs');if(!msgs)return;
  const d=document.createElement('div');d.className=`msg ${role}`;d.textContent=text;
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}
function s2ShowTyping(){
  const msgs=document.getElementById('chatMsgs');if(!msgs)return;
  const t=document.createElement('div');t.className='typing';t.id='s2typing';
  t.innerHTML='<span></span><span></span><span></span>';
  msgs.appendChild(t);msgs.scrollTop=msgs.scrollHeight;
}
function s2HideTyping(){document.getElementById('s2typing')?.remove();const cb=document.getElementById('s2ConfirmBtn');if(cb)cb.disabled=false;}
function s2UpdateRounds(){
  const el=document.getElementById('roundsLeft');
  if(el)el.textContent=`${CONFIG.MAX_CHAT_ROUNDS-ST.chatRounds} שאלות נותרו`;
  const btn=document.getElementById('sendBtn');if(btn)btn.disabled=ST.chatRounds>=CONFIG.MAX_CHAT_ROUNDS;
  const inp=document.getElementById('chatText');if(inp)inp.disabled=ST.chatRounds>=CONFIG.MAX_CHAT_ROUNDS;
}

function s2GoChangeChoice(){
  ST.s2.firstChoice=null;ST.s2.finalChoice=null;
  ST.chatHistory=[];ST.chatRounds=0;
  renderS2Choose();
}

      </div>`).join('')}

function s2SubmitLikert(){
  const questions = getS2LikertQ();
  const vals={};
  for(const q of questions){
    const v=document.querySelector(`input[name="s2lk_${q.id}"]:checked`);
    if(!v){document.getElementById('s2LikertErr').textContent='נא לענות על כל השאלות.';document.getElementById('s2LikertErr').classList.add('show');return;}
    vals[q.id]=+v.value;
  }
  ST.R[`R2`]=vals.confidence||0;
  ST.C[`C2`]=vals.helpful||vals.clarity||0;
  ST.D[`D2`]=ST.s2.finalChoice||ST.s2.firstChoice;
  ST.ts[`S2`]={...ST.ts[`S2`], end:Date.now()};
  if(ST.chatHistory.length>0){
    ST.allChatLogs[`S2`]=ST.chatHistory.map(m=>({r:m.role==='assistant'?'ai':'user',t:m.content.substring(0,300)}));
    saveChatLog(1, ST.allChatLogs[`S2`]);
  }
  setTimeout(()=>{ST.cur=2;ST.ts[`S3`]={start:Date.now()};ST.phase='scenario';go();},200);
}

async function s2CallLLM(){
  if(!CONFIG.APPS_SCRIPT_URL)return null;
  const msgs=ST.chatHistory.filter(m=>m.role!=='system').slice(-6);
  // Send sys prompt from client to bypass any server caching issues
  const sysprompt = "מנהל/ת דיגיטלי/ת. עברית, קצר. נתוני צוות: רועי=איכות גבוהה/עומס בינוני/קצב מהיר. יעל=איכות גבוהה מאוד/עומס נמוך/קצב מהיר מאוד. מיה=איכות טובה/עומס גבוה/קצב בינוני. שקד=איכות טובה/עומס בינוני/קצב איטי. כיוון: מיה. כלל: מותר רק נתונים אלה. אסור המצאות. עד 2 משפטים.";
  const compact={idx:98,cond:ST.cond,msgs,model:CONFIG.MODEL,pid:PARTICIPANT_ID,sys:sysprompt};
  for(let attempt=0;attempt<2;attempt++){
    try{
      const payload=encodeURIComponent(JSON.stringify(compact));
      const cbName='s2cb_'+Date.now()+'_'+attempt;
      const result=await new Promise(resolve=>{
        const timeout=setTimeout(()=>{resolve(null);cleanup()},30000);
        window[cbName]=d=>{clearTimeout(timeout);resolve(d.reply||null);cleanup()};
        function cleanup(){delete window[cbName];if(s.parentNode)s.parentNode.removeChild(s)}
        const s=document.createElement('script');
        s.src=CONFIG.APPS_SCRIPT_URL+'?callback='+cbName+'&payload='+payload;
        s.onerror=()=>{clearTimeout(timeout);resolve(null);cleanup()};
        document.body.appendChild(s);
      });
      if(result)return result;
      if(attempt<1)await new Promise(r=>setTimeout(r,2000));
    }catch(e){}
  }
  return 'מצטער/ת, לא הצלחתי להתחבר. נסה/י שוב.';
}

function s3SelectInitiative(id){
  if(ST.s3.firstChoice) return;
  ST.s3.firstChoice = id;
  const sel = S3_INITIATIVES.find(x=>x.id===id);
  const grid = document.getElementById('s3InitiativesGrid');
  grid.innerHTML = `<div style="grid-column:1/-1;background:var(--primary-light);border:2px solid var(--primary);border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:12px">
    <span style="font-size:22px">${sel.icon}</span>
    <div>
      <div style="font-size:13px;font-weight:700;color:var(--text)">${sel.name}</div>
      <div style="font-size:12px;color:var(--text2)">השפעה: ${sel.impact} · מהירות: ${sel.speed} · מורכבות: ${sel.complexity}</div>
    </div>
    <span style="margin-right:auto;font-size:12px;color:var(--primary);font-weight:500">✓ בחירה ראשונית</span>
  </div>`;
  document.getElementById('s3AfterChoice').style.display='block';
  if(ST.cond==='B'||ST.cond==='C'){
    const bubble=document.getElementById('s3AiBubble');
    bubble.style.display='block';
    document.getElementById('s3AiText').innerHTML='<span style="opacity:.5">מקליד/ה...</span>';
    setTimeout(()=>{const el=document.getElementById('s3AiText');if(el)el.textContent=ST.cond==='C'?S3_AI_C:S3_AI_B;},1200);
  }
  setTimeout(()=>document.getElementById('s3AfterChoice').scrollIntoView({behavior:'smooth',block:'start'}),100);
}

async function s3GoToChat(){
  if(ST.cond==='A'){s3GoConfirm();return;}
  renderS3Chat();
  const firstReply=ST.cond==='C'?(S3_FIRST_C[ST.s3.firstChoice]||S3_FIRST_C.training):(S3_FIRST_B[ST.s3.firstChoice]||S3_FIRST_B.training);
  ST.chatHistory.push({role:'assistant',content:firstReply});
  s3AddMsg('ai',firstReply);
}

function renderS3Chat(){
  const sel=S3_INITIATIVES.find(x=>x.id===ST.s3.firstChoice);
  app.innerHTML=`<div class="screen">${pBar()}<div class="card">
    <span class="scenario-badge">תרחיש 3 — שיחה עם דנה</span>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px">
      ${S3_INITIATIVES.map(x=>`<div style="padding:8px 10px;border-radius:10px;border:2px solid ${x.id===ST.s3.firstChoice?'var(--primary)':'var(--border)'};background:${x.id===ST.s3.firstChoice?'var(--primary-light)':'#f8f9fb'};text-align:center;font-size:12px">
        <span style="font-size:18px;display:block">${x.icon}</span>
        <div style="font-weight:700;color:${x.id===ST.s3.firstChoice?'var(--primary)':'var(--text)'};">${x.name}</div>
        <div style="color:var(--text2);font-size:11px">השפעה: ${x.impact}</div>
      </div>`).join('')}

function s3QuickReply(btn,text){
  document.getElementById('s3quickReplies').style.display='none';
  const qr=S3_QUICK_REPLIES.find(q=>q.text===text);
  if(qr){
    s3AddMsg('user',text);
    ST.chatHistory.push({role:'user',content:text});
    ST.chatRounds++;
    s3UpdateRounds();
    const _sqKey3=`S3`;
    if(!ST.chatMsgCount[_sqKey3])ST.chatMsgCount[_sqKey3]=0;
    ST.chatMsgCount[_sqKey3]++;
    if(!ST.chatFirstMsgTime[_sqKey3])ST.chatFirstMsgTime[_sqKey3]=Date.now();
    const reply=ST.cond==='C'?qr.reply_c:qr.reply_b;
    ST.chatHistory.push({role:'assistant',content:reply});
    s3AddMsg('ai',reply);
  }
  const confirmBtn=document.getElementById('s3ConfirmBtn');
  const hintMsg=document.getElementById('s3HintMsg');
  if(confirmBtn)confirmBtn.style.display='block';
  if(hintMsg)hintMsg.style.display='none';
}

async function s3SendMsg(){
  if(ST.chatRounds>=CONFIG.MAX_CHAT_ROUNDS)return;
  const inp=document.getElementById('chatText');
  const text=inp?.value?.trim();if(!text)return;
  inp.value='';
  ST.chatHistory.push({role:'user',content:text});
  ST.chatRounds++;
  s3AddMsg('user',text);
  s3UpdateRounds();
  // Track chat metrics
  const _sKey3=`S3`;
  if(!ST.chatMsgCount[_sKey3])ST.chatMsgCount[_sKey3]=0;
  ST.chatMsgCount[_sKey3]++;
  if(!ST.chatFirstMsgTime[_sKey3])ST.chatFirstMsgTime[_sKey3]=Date.now();
  document.getElementById('s3quickReplies')?.style&&(document.getElementById('s3quickReplies').style.display='none');
  const s3cb=document.getElementById('s3ConfirmBtn');const s3hm=document.getElementById('s3HintMsg');
  if(s3cb)s3cb.style.display='block';if(s3hm)s3hm.style.display='none';
  {const cb=document.getElementById('s3ConfirmBtn');if(cb)cb.disabled=true;} s3ShowTyping();
  const reply=await s3CallLLM();
  s3HideTyping();
  if(reply){ST.chatHistory.push({role:'assistant',content:reply});s3AddMsg('ai',reply);}
}

function s3AddMsg(role,text){const msgs=document.getElementById('chatMsgs');if(!msgs)return;const d=document.createElement('div');d.className=`msg ${role}`;d.textContent=text;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;}
function s3ShowTyping(){const msgs=document.getElementById('chatMsgs');if(!msgs)return;const t=document.createElement('div');t.className='typing';t.id='s3typing';t.innerHTML='<span></span><span></span><span></span>';msgs.appendChild(t);msgs.scrollTop=msgs.scrollHeight;}
function s3HideTyping(){document.getElementById('s3typing')?.remove();const cb=document.getElementById('s3ConfirmBtn');if(cb)cb.disabled=false;}
function s3UpdateRounds(){const el=document.getElementById('roundsLeft');if(el)el.textContent=`${CONFIG.MAX_CHAT_ROUNDS-ST.chatRounds} שאלות נותרו`;const btn=document.getElementById('sendBtn');if(btn)btn.disabled=ST.chatRounds>=CONFIG.MAX_CHAT_ROUNDS;const inp=document.getElementById('chatText');if(inp)inp.disabled=ST.chatRounds>=CONFIG.MAX_CHAT_ROUNDS;}
function s3GoChangeChoice(){ST.s3.firstChoice=null;ST.s3.finalChoice=null;ST.chatHistory=[];ST.chatRounds=0;renderS3Choose();}
function s3ConfirmSame(){ST.s3.finalChoice=ST.s3.firstChoice;s3GoLikert();}

function s3GoConfirm(){
  const sel=S3_INITIATIVES.find(x=>x.id===ST.s3.firstChoice);
  app.innerHTML=`<div class="screen">${pBar()}<div class="card">
    <span class="scenario-badge">תרחיש 3 — בחירה סופית</span>
    <h2>מה הבחירה הסופית שלך?</h2>
    <p style="font-size:13px;color:var(--text2);margin-bottom:16px">בחירה ראשונית: <strong>${sel.icon} ${sel.name}</strong> — תוכל/י לשנות.</p>

  const questions=getS3LikertQ();
  app.innerHTML=`<div class="screen">${pBar()}<div class="card">

      </div>`).join('')}
    <div class="error-msg" id="s3LikertErr"></div>

function s3SubmitLikert(){
  const questions=getS3LikertQ();const vals={};
  for(const q of questions){const v=document.querySelector(`input[name="s3lk_${q.id}"]:checked`);if(!v){document.getElementById('s3LikertErr').textContent='נא לענות על כל השאלות.';document.getElementById('s3LikertErr').classList.add('show');return;}vals[q.id]=+v.value;}
  ST.R['R3']=vals.confidence||0;ST.C['C3']=vals.helpful||vals.clarity||0;
  ST.D['D3']=ST.s3.finalChoice||ST.s3.firstChoice;
  ST.ts['S3']={...ST.ts['S3'],end:Date.now()};
  if(ST.chatHistory.length>0){ST.allChatLogs['S3']=ST.chatHistory.map(m=>({r:m.role==='assistant'?'ai':'user',t:m.content.substring(0,300)}));saveChatLog(2,ST.allChatLogs['S3']);}
  setTimeout(()=>{ST.cur=3;ST.ts['S4']={start:Date.now()};ST.phase='scenario';go();},200);
}

async function s3CallLLM(){
  if(!CONFIG.APPS_SCRIPT_URL)return null;
  const msgs=ST.chatHistory.filter(m=>m.role!=='system').slice(-6);
  const compact={idx:97,cond:ST.cond,msgs,model:CONFIG.MODEL,pid:PARTICIPANT_ID};
  for(let attempt=0;attempt<2;attempt++){
    try{
      const payload=encodeURIComponent(JSON.stringify(compact));
      const cbName='s3cb_'+Date.now()+'_'+attempt;
      const result=await new Promise(resolve=>{
        const timeout=setTimeout(()=>{resolve(null);cleanup()},30000);
        window[cbName]=d=>{clearTimeout(timeout);resolve(d.reply||null);cleanup()};
        function cleanup(){delete window[cbName];if(s.parentNode)s.parentNode.removeChild(s)}
        const s=document.createElement('script');
        s.src=CONFIG.APPS_SCRIPT_URL+'?callback='+cbName+'&payload='+payload;
        s.onerror=()=>{clearTimeout(timeout);resolve(null);cleanup()};
        document.body.appendChild(s);
      });
      if(result)return result;
      if(attempt<1)await new Promise(r=>setTimeout(r,2000));
    }catch(e){}
  }
  return 'מצטער/ת, לא הצלחתי להתחבר. נסה/י שוב.';
}

function s4SelectOption(id){
  if(ST.s4.firstChoice) return;
  ST.s4.firstChoice = id;
  const sel = S4_OPTIONS.find(x=>x.id===id);
  // Highlight selected, dim others
  S4_OPTIONS.forEach(o=>{
    const el=document.getElementById('s4mc_'+o.id);
    if(el){
      if(o.id===id){el.style.border='2px solid var(--primary)';el.style.background='var(--primary-light)';el.style.transform='scale(1.03)';}
      else{el.style.opacity='0.4';el.style.pointerEvents='none';}
    }
  });
  document.getElementById('s4AfterChoice').style.display='block';
  if(ST.cond==='B'||ST.cond==='C'){
    const bubble=document.getElementById('s4AiBubble');
    bubble.style.display='block';
    document.getElementById('s4AiText').innerHTML='<span style="opacity:.5">מקליד/ה...</span>';
    setTimeout(()=>{const el=document.getElementById('s4AiText');if(el)el.textContent=ST.cond==='C'?S4_AI_C:S4_AI_B;},1200);
  }
  setTimeout(()=>document.getElementById('s4AfterChoice').scrollIntoView({behavior:'smooth',block:'start'}),100);
}

async function s4GoToChat(){
  if(ST.cond==='A'){s4GoConfirm();return;}
  renderS4Chat();
  const firstReply=ST.cond==='C'?(S4_FIRST_C[ST.s4.firstChoice]||S4_FIRST_C.check):(S4_FIRST_B[ST.s4.firstChoice]||S4_FIRST_B.check);
  ST.chatHistory.push({role:'assistant',content:firstReply});
  s4AddMsg('ai',firstReply);
}

function renderS4Chat(){
  const sel=S4_OPTIONS.find(x=>x.id===ST.s4.firstChoice);
  app.innerHTML=`<div class="screen">${pBar()}<div class="card">
    <span class="scenario-badge">תרחיש 4 — שיחה עם דנה</span>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px">
      ${S4_OPTIONS.map(x=>`<div style="padding:8px 10px;border-radius:10px;border:2px solid ${x.id===ST.s4.firstChoice?'var(--primary)':'var(--border)'};background:${x.id===ST.s4.firstChoice?'var(--primary-light)':'#f8f9fb'};text-align:center;font-size:12px">
        <span style="font-size:22px;display:block">${x.emoji}</span>
        <div style="font-weight:700;color:${x.id===ST.s4.firstChoice?'var(--primary)':'var(--text)'}">${x.label}</div>
      </div>`).join('')}

function s4QuickReply(btn,text){
  document.getElementById('s4quickReplies').style.display='none';
  const qr=S4_QUICK.find(q=>q.text===text);
  if(qr){
    s4AddMsg('user',text);ST.chatHistory.push({role:'user',content:text});ST.chatRounds++;s4UpdateRounds();
    const reply=ST.cond==='C'?qr.reply_c:qr.reply_b;
    ST.chatHistory.push({role:'assistant',content:reply});s4AddMsg('ai',reply);
  }
  const confirmBtn=document.getElementById('s4ConfirmBtn');
  const hintMsg=document.getElementById('s4HintMsg');
  if(confirmBtn)confirmBtn.style.display='block';
  if(hintMsg)hintMsg.style.display='none';
}

async function s4SendMsg(){
  if(ST.chatRounds>=CONFIG.MAX_CHAT_ROUNDS)return;
  const inp=document.getElementById('chatText');const text=inp?.value?.trim();if(!text)return;
  inp.value='';ST.chatHistory.push({role:'user',content:text});ST.chatRounds++;
  if(!ST.chatMsgCount['S4'])ST.chatMsgCount['S4']=0;ST.chatMsgCount['S4']++;
  if(!ST.chatFirstMsgTime['S4'])ST.chatFirstMsgTime['S4']=Date.now();
  s4AddMsg('user',text);s4UpdateRounds();
  document.getElementById('s4quickReplies')?.style&&(document.getElementById('s4quickReplies').style.display='none');
  const s4cb=document.getElementById('s4ConfirmBtn');const s4hm=document.getElementById('s4HintMsg');
  if(s4cb)s4cb.style.display='block';if(s4hm)s4hm.style.display='none';
  {const cb=document.getElementById('s4ConfirmBtn');if(cb)cb.disabled=true;} s4ShowTyping();const reply=await s4CallLLM();s4HideTyping();
  if(reply){ST.chatHistory.push({role:'assistant',content:reply});s4AddMsg('ai',reply);}
}

function s4AddMsg(role,text){const msgs=document.getElementById('chatMsgs');if(!msgs)return;const d=document.createElement('div');d.className=`msg ${role}`;d.textContent=text;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;}
function s4ShowTyping(){const msgs=document.getElementById('chatMsgs');if(!msgs)return;const t=document.createElement('div');t.className='typing';t.id='s4typing';t.innerHTML='<span></span><span></span><span></span>';msgs.appendChild(t);msgs.scrollTop=msgs.scrollHeight;}
function s4HideTyping(){document.getElementById('s4typing')?.remove();const cb=document.getElementById('s4ConfirmBtn');if(cb)cb.disabled=false;}
function s4UpdateRounds(){const el=document.getElementById('roundsLeft');if(el)el.textContent=`${CONFIG.MAX_CHAT_ROUNDS-ST.chatRounds} שאלות נותרו`;const btn=document.getElementById('sendBtn');if(btn)btn.disabled=ST.chatRounds>=CONFIG.MAX_CHAT_ROUNDS;const inp=document.getElementById('chatText');if(inp)inp.disabled=ST.chatRounds>=CONFIG.MAX_CHAT_ROUNDS;}
function s4GoChangeChoice(){ST.s4.firstChoice=null;ST.s4.finalChoice=null;ST.chatHistory=[];ST.chatRounds=0;renderS4Choose();}
function s4ConfirmSame(){ST.s4.finalChoice=ST.s4.firstChoice;s4GoLikert();}

function s4GoConfirm(){
  app.innerHTML=`<div class="screen">${pBar()}<div class="card">
    <span class="scenario-badge">תרחיש 4 — בחירה סופית</span>
    <h2>מה הבחירה הסופית שלך?</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0">
      ${S4_OPTIONS.map(o=>`
        <div onclick="s4SetFinal('${o.id}')" id="s4fc_${o.id}"
          style="background:#fff;border:2px solid ${ST.s4.firstChoice===o.id?'var(--primary)':'var(--border)'};border-radius:16px;padding:20px 14px;cursor:pointer;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04)">
          <div style="font-size:36px;margin-bottom:8px">${o.emoji}</div>
          <div style="font-size:13px;font-weight:700;color:var(--text)">${o.label}</div>
        </div>`).join('')}
    </div>
    <div class="error-msg" id="s4ConfirmErr"></div>
    <button class="btn btn-primary" onclick="s4SubmitFinal()">אשר/י בחירה סופית ←</button>
  </div></div>`;
  if(!ST.s4.finalChoice)ST.s4.finalChoice=ST.s4.firstChoice;
}

function s4SubmitLikert(){
  const questions=getS4LikertQ();const vals={};
  for(const q of questions){const v=document.querySelector(`input[name="s4lk_${q.id}"]:checked`);if(!v){document.getElementById('s4LikertErr').textContent='נא לענות על כל השאלות.';document.getElementById('s4LikertErr').classList.add('show');return;}vals[q.id]=+v.value;}
  ST.R['R4']=vals.confidence||0;ST.C['C4']=vals.helpful||vals.clarity||0;
  ST.D['D4']=ST.s4?.finalChoice||ST.s4?.firstChoice||'check';
  ST.ts['S4']={...ST.ts['S4'],end:Date.now()};
  if(ST.chatHistory.length>0){ST.allChatLogs['S4']=ST.chatHistory.map(m=>({r:m.role==='assistant'?'ai':'user',t:m.content.substring(0,300)}));saveChatLog(3,ST.allChatLogs['S4']);}
  setTimeout(()=>{ST.cur=4;ST.ts['S5']={start:Date.now()};ST.phase='scenario';go();},200);
}

async function s4CallLLM(){
  if(!CONFIG.APPS_SCRIPT_URL)return null;
  const msgs=ST.chatHistory.filter(m=>m.role!=='system').slice(-6);
  const compact={idx:96,cond:ST.cond,msgs,model:CONFIG.MODEL,pid:PARTICIPANT_ID};
  for(let attempt=0;attempt<2;attempt++){
    try{
      const payload=encodeURIComponent(JSON.stringify(compact));
      const cbName='s4cb_'+Date.now()+'_'+attempt;
      const result=await new Promise(resolve=>{
        const timeout=setTimeout(()=>{resolve(null);cleanup()},30000);
        window[cbName]=d=>{clearTimeout(timeout);resolve(d.reply||null);cleanup()};
        function cleanup(){delete window[cbName];if(s.parentNode)s.parentNode.removeChild(s)}
        const s=document.createElement('script');
        s.src=CONFIG.APPS_SCRIPT_URL+'?callback='+cbName+'&payload='+payload;
        s.onerror=()=>{clearTimeout(timeout);resolve(null);cleanup()};
        document.body.appendChild(s);
      });
      if(result)return result;
      if(attempt<1)await new Promise(r=>setTimeout(r,2000));
    }catch(e){}
  }
  return 'מצטער/ת, לא הצלחתי להתחבר. נסה/י שוב.';
}

function s5SelectOption(id){
  if(ST.s5.firstChoice)return;
  ST.s5.firstChoice=id;
  document.querySelectorAll('[id^="s5mc_"]').forEach(c=>{c.style.opacity='0.4';c.style.pointerEvents='none';});
  const el=document.getElementById('s5mc_'+id);
  el.style.opacity='1';el.style.border='2px solid var(--primary)';el.style.background='var(--primary-light)';
  document.getElementById('s5AfterChoice').style.display='block';
  if(ST.cond==='B'||ST.cond==='C'){
    document.getElementById('s5AiBubble').style.display='block';
    document.getElementById('s5AiText').innerHTML='<span style="opacity:.5">מקליד/ה...</span>';
    setTimeout(()=>{const el=document.getElementById('s5AiText');if(el)el.textContent=ST.cond==='C'?S5_AI_C:S5_AI_B;},1200);
  }
  setTimeout(()=>document.getElementById('s5AfterChoice').scrollIntoView({behavior:'smooth',block:'start'}),100);
}

async function s5GoToChat(){
  if(ST.cond==='A'){s5GoConfirm();return;}
  renderS5Chat();
  const r=ST.cond==='C'?(S5_FIRST_C[ST.s5.firstChoice]||S5_FIRST_C.opt1):(S5_FIRST_B[ST.s5.firstChoice]||S5_FIRST_B.opt1);
  ST.chatHistory.push({role:'assistant',content:r});s5AddMsg('ai',r);
}

function renderS5Chat(){
  const sel=S5_OPTIONS.find(x=>x.id===ST.s5.firstChoice);
  app.innerHTML=`<div class="screen">${pBar()}<div class="card">
    <span class="scenario-badge">תרחיש 5 — שיחה עם דנה</span>
    <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:12px">
      ${S5_OPTIONS.map(x=>`<div style="padding:8px 12px;border-radius:10px;border:2px solid ${x.id===ST.s5.firstChoice?'var(--primary)':'var(--border)'};background:${x.id===ST.s5.firstChoice?'var(--primary-light)':'#f8f9fb'};font-size:12px">
        <span style="font-weight:700;color:${x.id===ST.s5.firstChoice?'var(--primary)':'var(--text2)'};">${x.label}: </span>
        <span style="color:var(--text)">${x.desc.substring(0,60)}${x.desc.length>60?'...':''}</span>
      </div>`).join('')}

function s5QuickReply(btn,text){
  document.getElementById('s5qr').style.display='none';
  const qr=S5_QR.find(q=>q.text===text);
  if(qr){s5AddMsg('user',text);ST.chatHistory.push({role:'user',content:text});ST.chatRounds++;s5UpdateRounds();
    const r=ST.cond==='C'?qr.reply_c:qr.reply_b;
    ST.chatHistory.push({role:'assistant',content:r});s5AddMsg('ai',r);}
  const confirmBtn=document.getElementById('s5ConfirmBtn');
  const hintMsg=document.getElementById('s5HintMsg');
  if(confirmBtn)confirmBtn.style.display='block';
  if(hintMsg)hintMsg.style.display='none';
}
async function s5SendMsg(){
  if(ST.chatRounds>=CONFIG.MAX_CHAT_ROUNDS)return;
  const inp=document.getElementById('chatText');const text=inp?.value?.trim();if(!text)return;
  inp.value='';ST.chatHistory.push({role:'user',content:text});ST.chatRounds++;
  if(!ST.chatMsgCount['S5'])ST.chatMsgCount['S5']=0;ST.chatMsgCount['S5']++;
  if(!ST.chatFirstMsgTime['S5'])ST.chatFirstMsgTime['S5']=Date.now();
  s5AddMsg('user',text);s5UpdateRounds();
  document.getElementById('s5qr')&&(document.getElementById('s5qr').style.display='none');
  const s5cb=document.getElementById('s5ConfirmBtn');const s5hm=document.getElementById('s5HintMsg');
  if(s5cb)s5cb.style.display='block';if(s5hm)s5hm.style.display='none';
  s5ShowTyping();const reply=await s5CallLLM();s5HideTyping();
  if(reply){ST.chatHistory.push({role:'assistant',content:reply});s5AddMsg('ai',reply);}
}
function s5AddMsg(role,text){const m=document.getElementById('chatMsgs');if(!m)return;const d=document.createElement('div');d.className=`msg ${role}`;d.textContent=text;m.appendChild(d);m.scrollTop=m.scrollHeight;}
function s5ShowTyping(){const m=document.getElementById('chatMsgs');if(!m)return;const t=document.createElement('div');t.className='typing';t.id='s5t';t.innerHTML='<span></span><span></span><span></span>';m.appendChild(t);m.scrollTop=m.scrollHeight;const cb=document.getElementById('s5ConfirmBtn');if(cb)cb.disabled=true;}
function s5HideTyping(){document.getElementById('s5t')?.remove();const cb=document.getElementById('s5ConfirmBtn');if(cb)cb.disabled=false;}
function s5UpdateRounds(){const el=document.getElementById('roundsLeft');if(el)el.textContent=`${CONFIG.MAX_CHAT_ROUNDS-ST.chatRounds} שאלות נותרו`;const b=document.getElementById('sendBtn');if(b)b.disabled=ST.chatRounds>=CONFIG.MAX_CHAT_ROUNDS;const i=document.getElementById('chatText');if(i)i.disabled=ST.chatRounds>=CONFIG.MAX_CHAT_ROUNDS;}
function s5GoChangeChoice(){ST.s5.firstChoice=null;ST.s5.finalChoice=null;ST.chatHistory=[];ST.chatRounds=0;renderS5Choose();}
function s5ConfirmSame(){ST.s5.finalChoice=ST.s5.firstChoice;s5GoLikert();}

function s5GoConfirm(){
  app.innerHTML=`<div class="screen">${pBar()}<div class="card">
    <span class="scenario-badge">תרחיש 5 — בחירה סופית</span>
    <h2>מה הבחירה הסופית שלך?</h2>
    <div style="display:flex;flex-direction:column;gap:10px;margin:10px 0">
      ${S5_OPTIONS.map(o=>`<div onclick="s5SetFinal('${o.id}')" id="s5fc_${o.id}" style="background:#fff;border:2px solid ${ST.s5.firstChoice===o.id?'var(--primary)':'var(--border)'};border-radius:14px;padding:14px 18px;cursor:pointer">
        <div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:4px">${o.label}</div>
        <div style="font-size:13px;color:var(--text)">${o.desc}</div>
      </div>`).join('')}
    </div>
    <div class="error-msg" id="s5err"></div>
    <button class="btn btn-primary" onclick="s5SubmitFinal()">אשר/י בחירה סופית ←</button>
  </div></div>`;
  if(!ST.s5.finalChoice)ST.s5.finalChoice=ST.s5.firstChoice;
}
function s5SetFinal(id){ST.s5.finalChoice=id;document.querySelectorAll('[id^="s5fc_"]').forEach(c=>c.style.borderColor='var(--border)');document.getElementById('s5fc_'+id).style.borderColor='var(--success)';}
function s5SubmitFinal(){if(!ST.s5.finalChoice){document.getElementById('s5err').textContent='נא לבחור.';document.getElementById('s5err').classList.add('show');return;}s5GoLikert();}

function s5GoLikert(){
  const qs=getS5LikertQ();
  app.innerHTML=`<div class="screen">${pBar()}<div class="card">
    <span class="scenario-badge">תרחיש 5 — שאלות סיום</span>
    <h2>עוד 3 שאלות קצרות</h2>
    <div style="font-size:12px;color:var(--text2);margin-bottom:4px">1 = בכלל לא &nbsp;·&nbsp; 7 = במידה רבה מאוד</div>
    ${qs.map((q,i)=>`<div style="margin-bottom:20px"><div class="likert-q">${i+1}. ${q.text}</div>
      <div class="likert-scale">${[1,2,3,4,5,6,7].map(n=>`<label><input type="radio" name="s5lk_${q.id}" value="${n}"><span class="lk">${n}</span></label>`).join('')}</div>
    </div>`).join('')}
    <div class="error-msg" id="s5lerr"></div>
    <button class="btn btn-primary" onclick="s5SubmitLikert()">המשך לשאלות אחרונות ←</button>
  </div></div>`;
}
function s5SubmitLikert(){
  const qs=getS5LikertQ();const vals={};
  for(const q of qs){const v=document.querySelector(`input[name="s5lk_${q.id}"]:checked`);if(!v){document.getElementById('s5lerr').textContent='נא לענות על כל השאלות.';document.getElementById('s5lerr').classList.add('show');return;}vals[q.id]=+v.value;}
  ST.R['R5']=vals.confidence||0;ST.C['C5']=vals.helpful||vals.clarity||0;
  ST.D['D5']=ST.s5.finalChoice||ST.s5.firstChoice;
  ST.ts['S5']={...ST.ts['S5'],end:Date.now()};ST.tEnd=Date.now();
  if(ST.chatHistory.length>0){ST.allChatLogs['S5']=ST.chatHistory.map(m=>({r:m.role==='assistant'?'ai':'user',t:m.content.substring(0,300)}));saveChatLog(4,ST.allChatLogs['S5']);}
  setTimeout(()=>{ST.phase='manipCheck';go();},200);
}
async function s5CallLLM(){
  if(!CONFIG.APPS_SCRIPT_URL)return null;
  const msgs=ST.chatHistory.filter(m=>m.role!=='system').slice(-6);
  const compact={idx:95,cond:ST.cond,msgs,model:CONFIG.MODEL,pid:PARTICIPANT_ID};
  for(let attempt=0;attempt<2;attempt++){try{
    const payload=encodeURIComponent(JSON.stringify(compact));
    const cbName='s5cb_'+Date.now()+'_'+attempt;
    const result=await new Promise(resolve=>{
      const timeout=setTimeout(()=>{resolve(null);cleanup()},30000);
      window[cbName]=d=>{clearTimeout(timeout);resolve(d.reply||null);cleanup()};
      function cleanup(){delete window[cbName];if(s.parentNode)s.parentNode.removeChild(s)}
      const s=document.createElement('script');
      s.src=CONFIG.APPS_SCRIPT_URL+'?callback='+cbName+'&payload='+payload;
      s.onerror=()=>{clearTimeout(timeout);resolve(null);cleanup()};
      document.body.appendChild(s);
    });
    if(result)return result;
    if(attempt<1)await new Promise(r=>setTimeout(r,2000));
  }catch(e){}}
  return 'מצטער/ת, לא הצלחתי להתחבר.';
}

  enhanceMobileCards();

  // Condition A: show instruction in chat
  if(!hasAI){
    addChatBubble('📋 ' + s.inputLabel,'system');

  // Conditions B/C: generate initial AI message
  if(hasAI){
    const msgs=buildLLMMessages(i, 'initial');
    const reply = await callLLM(msgs);
    ST.chatHistory.push({role:'assistant',content:reply});
    const typingEl=$('typing');
    if(typingEl)typingEl.remove();

      const isLTR=/^[0-9A-Za-z]/.test(v);
      it.style.direction=isLTR?'ltr':'rtl';
      it.style.textAlign=isLTR?'left':'right';

    it.addEventListener('focus',syncDir);
    syncDir();
  }
}

function buildLLMMessages(idx, type, userMsg=''){
  const s=SCENARIOS[idx-3]||SCENARIOS[idx];
  const sys={role:'system',content:sysPrompt(idx)};
  if(type==='initial'){
    const condPrompt = ST.cond==='B'
      ? `כתוב/כתבי בדיוק 2 משפטים קצרים:
1) משפט שמכוון לקריטריון חשוב ברמה גבוהה, בלי לנקוב באפשרות ספציפית (למשל: "כדאי לחשוב על מה קורה כשדחיפות גבוהה וסיכון ללקוח גם גבוה").
2) שאלה שמקדמת החלטה ("מה יותר חשוב לך — ___ או ___?").
*** אסור: להזכיר שם/אות/מספר של אפשרות. אסור: "אני ממליץ", "תבחר". רק קריטריונים כלליים. ***`
      : `כתוב/כתבי עד 3 משפטים קצרים:
1) שאל על הקריטריונים החשובים למשתתף — למשל "מה חשוב לך יותר — דחיפות, השפעה על הלקוח, או מהירות טיפול?"
2) ציין trade-off כללי (בלי דוגמאות ספציפיות מהטבלה).
3) סיים ב"ההחלטה הסופית — שלך."
*** בהודעה הראשונה: אסור להזכיר אפשרויות ספציפיות כמו "VIP", "אובדן מידע", שמות נציגים. רק קריטריונים כלליים. דוגמאות ספציפיות מותרות רק בהודעות המשך. ***`;
    return [sys, {role:'user',content:condPrompt}];
  }
  // Follow-up
  const history = ST.chatHistory.map(m=>({role:m.role,content:m.content}));
  const payload = followupStyle() + "\n\nשאלת המשתתף: " + normalizeUserForLLM(userMsg);
  return [sys, ...history, {role:'user',content:payload}];
}

// Unified handler: detect if input is a choice or a question
function handleChatSubmit(){
  const input=$('chatText');
  const txt=input.value.trim();
  if(!txt)return;

  const i=ST.cur, s=SCENARIOS[i-3]||SCENARIOS[i];
  const hasAI=ST.cond==='B'||ST.cond==='C';

  // Try to validate as a choice
  const validated=s.validate(txt);

  if(validated!==null){
    // It's a valid choice — submit it
    addChatBubble(txt,'user');
    input.value='';
    ST.D[s.dKey]=validated;

    // Save chat logs
    if(ST.chatHistory.length>0){
      ST.allChatLogs[`S${i+1}`]=ST.chatHistory.map(m=>({r:m.role==='assistant'?'ai':'user',t:m.content.substring(0,300)}));
    }

    // Confirmation
    if(hasAI){
      if($('chatInput'))$('chatInput').style.display='none';
      addChatBubble('הבחירה נקלטה. תודה.','ai');
      if(ST.cond==='C'&&s.microExplanation){
        addChatBubble(s.microExplanation,'ai');
      }
    }else{
      if($('chatInput'))$('chatInput').style.display='none';
      addChatBubble('✅ הבחירה נקלטה.','system');
    }
    setTimeout(()=>{ST.phase='likert1';go()},800);
  } else if(hasAI && ST.chatRounds<CONFIG.MAX_CHAT_ROUNDS){
    // Check for filler/acknowledgment words — respond locally without LLM call
    const filler=/^(טוב|אוקי|אוקיי|ok|okay|הבנתי|ברור|כן|סבבה|תודה|יופי|נו)\.?$/i;
    if(filler.test(txt.trim())){
      addChatBubble(txt,'user');
      input.value='';
      const s2=SCENARIOS[ST.cur];
      addChatBubble(`אז מה ההחלטה שלך? ${s2.inputLabel}`,'ai');
      return;
    }
    // It's a question — send to AI
    sendChat();
  } else if(!hasAI){
    // Condition A — invalid choice
    addChatBubble(txt,'user');
    input.value='';
    addChatBubble('❌ ' + s.inputLabel,'system');
  } else {
    // B/C but out of rounds — must be a choice attempt
    addChatBubble(txt,'user');
    input.value='';
    addChatBubble('❌ הקלט לא תקין. ' + s.inputLabel,'system');
  }
}

async function sendChat(){
  const input=$('chatText');
  const txt=input.value.trim();
  if(!txt||ST.chatRounds>=CONFIG.MAX_CHAT_ROUNDS)return;

  // Track chat metrics
  const sKey=`S${ST.cur+1}`;
  if(!ST.chatMsgCount[sKey])ST.chatMsgCount[sKey]=0;
  ST.chatMsgCount[sKey]++;
  if(!ST.chatFirstMsgTime[sKey])ST.chatFirstMsgTime[sKey]=Date.now();

  addChatBubble(txt,'user');
  ST.chatHistory.push({role:'user',content:txt});
  input.value='';
  ST.chatRounds++;

  // Show typing
  const msgArea=$('chatMsgs');
  const typingEl=document.createElement('div');
  typingEl.className='typing';typingEl.id='typing2';
  typingEl.innerHTML='<span></span><span></span><span></span>';
  msgArea.appendChild(typingEl);
  msgArea.scrollTop=msgArea.scrollHeight;

  const msgs=buildLLMMessages(ST.cur,'followup',txt);
  const reply=await callLLM(msgs);
  ST.chatHistory.push({role:'assistant',content:reply});

  typingEl.remove();
  addChatBubble(reply,'ai');
  updateRoundsLeft();

  // Save chat incrementally after each AI reply (delayed to avoid overlap)
  const logs=ST.chatHistory.map(m=>({r:m.role==='assistant'?'ai':'user',t:m.content.substring(0,300)}));
  setTimeout(()=>saveChatLog(ST.cur, logs), 3000);

  if(ST.chatRounds>=CONFIG.MAX_CHAT_ROUNDS){
    addChatBubble('הגעת למכסת השאלות. הזן/י את בחירתך.','system');
  }
}

function enhanceMobileCards(){
  document.querySelectorAll('.table-wrap table').forEach(table=>{
    const headerRow=table.querySelector('tr');
    if(!headerRow)return;
    const headers=Array.from(headerRow.querySelectorAll('th')).map(th=>th.textContent.trim());
    Array.from(table.querySelectorAll('tr')).slice(1).forEach(tr=>{
      Array.from(tr.querySelectorAll('td')).forEach((td,idx)=>{
        if(!td.hasAttribute('data-label'))td.setAttribute('data-label',headers[idx]||'');
      });
      const pill=tr.querySelector('.pill');
      if(pill){
        if(pill.classList.contains('u5'))tr.style.setProperty('--row-accent','var(--error)');
        else if(pill.classList.contains('u4')||pill.classList.contains('u3'))tr.style.setProperty('--row-accent','#9c6f00');
        else if(pill.classList.contains('u2'))tr.style.setProperty('--row-accent','#006644');
        else if(pill.classList.contains('u1'))tr.style.setProperty('--row-accent','#495057');
      }
    });
  });
}

function addChatBubble(text,type){
  const msgArea=$('chatMsgs');
  const div=document.createElement('div');
  div.className=`msg ${type}`;
  div.textContent=text;
  msgArea.appendChild(div);
  msgArea.scrollTop=msgArea.scrollHeight;
}

function updateRoundsLeft(){
  const el=$('roundsLeft');
  if(!el)return;
  const left=CONFIG.MAX_CHAT_ROUNDS-ST.chatRounds;
  el.textContent=left>0?`${left} שאלות נותרו`:'';
}

function doLikertSubmit(){
  const r1=document.querySelector('input[name="r"]:checked');
  const r2=document.querySelector('input[name="c"]:checked');
  if(!r1||!r2)return;
  const i=ST.cur;
  ST.R[`R${i+1}`]=+r1.value;
  ST.C[`C${i+1}`]=+r2.value;
  ST.ts[`S${i+1}`].end=Date.now();
  // Save chat log only if user had actual interaction
  const sKey=`S${i+1}`;
  if(ST.allChatLogs[sKey]&&ST.allChatLogs[sKey].length>0&&ST.chatMsgCount[sKey]>0){
    saveChatLog(i, ST.allChatLogs[sKey]);
  }
  setTimeout(()=>{if(i<4){ST.cur=i+1;ST.ts[`S${i+2}`]={start:Date.now()};ST.phase='scenario'}else{ST.tEnd=Date.now();ST.phase='manipCheck'}go()},200);
}

function submitManipCheck(){
  const mc1=document.querySelector('input[name="mc1"]:checked');
  const mc2=document.querySelector('input[name="mc2"]:checked');
  const mc3=document.querySelector('input[name="mc3"]:checked');

  ST.MC={MC_transparency:+mc1.value, MC_explainability:+mc2.value, MC_trust:+mc3.value};
  if(SKIP_SURVEYS){ST.phase='done'}else{ST.phase='postPEU'}
  go();
}

// ─── Done ───
async function rDone(){
  const rawTime=Math.round((ST.tEnd-ST.t0)/1000);
  const redirectUrl=(()=>{
    // Sekernet panel redirect takes priority
    if(SURVEY_ID&&SEKERNET_UID){
      return `https://panel.sekernet.co.il/?surveyid=${encodeURIComponent(SURVEY_ID)}&uid=${encodeURIComponent(SEKERNET_UID)}&status=1`;
    }
    // Otherwise use ?redirect= param with pid appended
    const base=new URLSearchParams(location.search).get('redirect')||'';
    if(!base) return '';
    const sep=base.includes('?')?'&':'?';
    return base+(PARTICIPANT_ID?sep+'pid='+encodeURIComponent(PARTICIPANT_ID):'');
  })();
  app.innerHTML=`<div class="screen">
    <div class="progress-bar">${[0,1,2,3,4].map(()=>'<div class="progress-step done"></div>').join('')}</div>
    <div class="card" style="text-align:center;padding:40px 32px">
      <div style="font-size:48px;margin-bottom:16px">🎉</div>
      <h2>הסימולציה הסתיימה!</h2>
      <p style="margin-top:12px">כל התשובות, הזמנים והדירוגים נשמרו אוטומטית.</p>
      <div class="saving-status" id="ss" style="font-size:15px;margin:20px 0">⏳ שומר נתונים...</div>
      <p style="font-size:14px;color:var(--text2)">זמן כולל: ${rawTime} שניות · קבוצה: ${ST.cond}</p>
      <br><p style="font-size:18px;color:var(--text)">תודה רבה על ההשתתפות! 🙏</p>
    </div></div>`;
  const res=await saveToSheets(buildRow());const el=$('ss');
  if(res.ok){
    el.innerHTML='✅ הנתונים נשמרו בהצלחה';el.style.color='var(--success)';
    if(redirectUrl){setTimeout(()=>{window.location.href=redirectUrl},1500)}

  else if(res.reason==='no_url'){
    el.innerHTML='⚠️ שמירה אוטומטית לא הוגדרה';el.style.color='#e68a00';
    if(redirectUrl){setTimeout(()=>{window.location.href=redirectUrl},1500)}
  }
  else{el.innerHTML='⚠️ אירעה שגיאה בשמירה — נא לפנות לחוקר/ת';el.style.color='var(--error)'}
}
